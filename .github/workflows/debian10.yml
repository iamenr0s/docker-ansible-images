name: Build and Push docker-debian10-ansible

on:
  push:
    branches:
      - main
    paths:
      - 'debian10/**'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: iamenr0s/docker-debian10-ansible

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set short SHA tag
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build amd64
        run: podman build --platform linux/amd64 --manifest debian10 -f debian10/Dockerfile .

      - name: Build arm64
        run: podman build --platform linux/arm64 --manifest debian10 -f debian10/Dockerfile .

      - name: Push to Quay.io
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
        run: |
          podman manifest push --all debian10 quay.io/${{ env.IMAGE_NAME }}:latest
          podman manifest push --all debian10 "quay.io/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

      - name: Push to Docker Hub
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
        run: |
          podman manifest push --all debian10 docker.io/${{ env.IMAGE_NAME }}:latest
          podman manifest push --all debian10 "docker.io/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
